services:
  db:
    image: postgres:15-alpine
    container_name: tam_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tam
    restart: unless-stopped
    networks:
      - default
      - net-proxy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@tam_db:5432/${POSTGRES_DB}?schema=public
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - db
    # Para debug local sin nginx, descomentar y elegir puerto libre:
    # ports:
    #   - "3000:3000"

volumes:
  pgdata:

networks:
  net-proxy:
    external: true
